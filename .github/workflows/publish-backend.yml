name: Publish Backend

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'

jobs:
  publish_backend:
    name: Generate docker image and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Workload Identity Federation
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: '21'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/640912732949/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-deployer@writeopia.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Docker meta (gateway)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/writeopia/writeopia-backend
            europe-west4-docker.pkg.dev/writeopia/writeopia-images/writeopia-backend
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Docker meta (auth)
        id: meta-auth
        uses: docker/metadata-action@v6
        with:
          images: |
            europe-west4-docker.pkg.dev/writeopia/writeopia-images/writeopia-auth
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Docker meta (documents)
        id: meta-documents
        uses: docker/metadata-action@v6
        with:
          images: |
            europe-west4-docker.pkg.dev/writeopia/writeopia-images/writeopia-documents
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Release build
        run: ./gradlew :backend:gateway:buildFatJar :backend:micro:auth:buildFatJar :backend:micro:documents:buildFatJar --no-daemon

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: europe-west4-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image (gateway)
        uses: docker/build-push-action@v7
        with:
          context: ./backend/gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Build and push Docker image (auth)
        uses: docker/build-push-action@v7
        with:
          context: ./backend/micro/auth
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          labels: ${{ steps.meta-auth.outputs.labels }}
          provenance: false

      - name: Build and push Docker image (documents)
        uses: docker/build-push-action@v7
        with:
          context: ./backend/micro/documents
          push: true
          tags: ${{ steps.meta-documents.outputs.tags }}
          labels: ${{ steps.meta-documents.outputs.labels }}
          provenance: false
